<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Mission Explorer</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f4f4f4;
    }

    input, select, button {
      margin: 10px;
      padding: 8px;
    }

    #result {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>NASA Mission Explorer</h1>

  <input type="date" id="startDate">
  <input type="date" id="endDate">

  <br>

  <input type="text" id="searchInput" placeholder="Search by title..." oninput="searchData()">

  <select id="sortOption" onchange="sortData()">
    <option value="">Sort</option>
    <option value="asc">Title A-Z</option>
    <option value="desc">Title Z-A</option>
  </select>

  <br>

  <button onclick="getImages()">Get Images</button>

  <p id="loading" style="display:none;">Loading...</p>

  <div id="result"></div>

  <script src="script.js"></script>
</body>
</html>
